[env:tamaboard]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36-1/platform-espressif32.zip
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 460800          ; conservative; raise to 460800 once it works reliably

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D WIRELESS_PAPER      ; enables heltec-eink-modules pin presets for this board

; IMPORTANT: do NOT chain `-t uploadfs` with `-t upload` (or `-t run`) in one
; invocation. Pioarduino's build script (platforms/espressif32/builder/main.py
; ~line 800: switch_off_ldf) globally disables LDF whenever any FS target is on
; the command line — which breaks dep resolution for the firmware compile that
; runs in the same call. Use two invocations instead:
;     bin/pio run -t upload      # firmware  (LDF on, deps resolve)
;     bin/pio run -t uploadfs    # web UI    (LDF off, no compile needed)
; See the `bin/flash` wrapper which does this correctly.

board_build.filesystem = littlefs

lib_deps =
    https://github.com/todd-herbert/heltec-eink-modules
    h2zero/NimBLE-Arduino
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP
